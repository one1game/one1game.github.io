  <meta name="keywords" content="сканер уязвимостей, проверка сайта, XSS, SQL injection, CORS, security headers, кибербезопасность, бесплатный сканер" />

  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"SoftwareApplication",
    "name":"Cyber-Scanner",
    "applicationCategory":"SecurityApplication",
    "operatingSystem":"All",
    "offers":{"@type":"Offer","price":"0"},
    "description":"Бесплатный клиентский сканер безопасности сайтов. XSS, SQLi, CORS, headers, утечки данных."
  }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
<main id="main-content">
<div class="container">

  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>

  <!-- HEADER -->
  <section class="scanner-hero">
    <div class="hero-icon"><i class="fas fa-shield-halved"></i></div>
    <h1>Cyber-Scanner</h1>
    <p class="hero-sub">Бесплатный сканер уязвимостей — всё в браузере, ничего на сервер</p>
    <div class="hero-badges">
      <span><i class="fas fa-check-circle"></i> 20+ проверок</span>
      <span><i class="fas fa-bolt"></i> Мгновенно</span>
      <span><i class="fas fa-lock"></i> Приватно</span>
    </div>
  </section>

  <!-- INPUT -->
  <section class="scan-input-section">
    <div class="input-row">
      <div class="input-wrapper">
        <i class="fas fa-globe input-icon"></i>
        <input type="url" id="targetUrl" placeholder="https://example.com" class="scan-input" autocomplete="off" />
      </div>
      <button id="scanBtn" class="scan-btn" onclick="startScan()">
        <i class="fas fa-play"></i> Сканировать
      </button>
    </div>
    <div class="quick-scans">
      <span>Быстрые примеры:</span>
      <button onclick="quickScan('https://example.com')">example.com</button>
      <button onclick="quickScan('https://httpbin.org')">httpbin.org</button>
      <button onclick="quickScan('https://one1game.github.io')">one1game</button>
    </div>
  </section>

  <!-- MODULES -->
  <section class="modules-section" id="modulesSection">
    <h3 class="section-label">Модули сканирования</h3>
    <div class="modules-grid" id="modulesGrid">
      <label class="module-chip active" data-module="headers"><i class="fas fa-heading"></i> Headers</label>
      <label class="module-chip active" data-module="xss"><i class="fas fa-code"></i> XSS</label>
      <label class="module-chip active" data-module="sqli"><i class="fas fa-database"></i> SQL Injection</label>
      <label class="module-chip active" data-module="cors"><i class="fas fa-globe"></i> CORS</label>
      <label class="module-chip active" data-module="cookies"><i class="fas fa-cookie-bite"></i> Cookies</label>
      <label class="module-chip active" data-module="leaks"><i class="fas fa-eye"></i> Утечки</label>
      <label class="module-chip active" data-module="tech"><i class="fas fa-microchip"></i> Стек</label>
      <label class="module-chip active" data-module="paths"><i class="fas fa-folder-open"></i> Директории</label>
    </div>
  </section>

  <!-- PROGRESS -->
  <section class="progress-section hidden" id="progress">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Инициализация...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-scanline"></div>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </section>

  <!-- RESULTS -->
  <section class="results-section hidden" id="results">
    <div class="results-header-bar">
      <h3>Результаты сканирования</h3>
      <div class="results-actions">
        <button class="btn-sm" onclick="exportJSON()"><i class="fas fa-download"></i> JSON</button>
        <button class="btn-sm" onclick="copyReport()"><i class="fas fa-copy"></i> Копия</button>
      </div>
    </div>
    <div class="results-meta" id="resultsMeta"></div>

    <div class="results-layout">
      <div class="results-stats" id="resultsStats"></div>
      <div class="results-vulns" id="resultsVulns"></div>
      <div class="results-tech" id="resultsTech"></div>
    </div>
  </section>

  <!-- ERROR -->
  <div class="error-toast hidden" id="errorToast"></div>

  <!-- HISTORY -->
  <section class="history-section" id="historySection">
    <div class="history-header">
      <h3 class="section-label">История сканирований</h3>
      <button class="btn-sm btn-ghost" onclick="clearHistory()">Очистить</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Пока пусто — запустите первое сканирование</div>
    </div>
  </section>

</div>
</main>

<script src="/components.js" defer></script>
<script src="scanner.js?v=1" defer></script>
</body>
</html>
