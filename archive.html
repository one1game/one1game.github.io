<script defer src="articles-data.js?v=7"></script>
<script>
// === ARCHIVE PAGE LOGIC ===
let allArticles = [];
let currentCategory = 'all';
let currentPage = 1;
const perPage = 6;

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    allArticles = window.allArticles || [];
    // Read ?category= from URL
    const params = new URLSearchParams(window.location.search);
    const catParam = params.get('category');
    if (catParam) {
      currentCategory = catParam;
    }
    initFilters();
    filterAndDisplay();
    initSearch();
  }, 100);
});

function initFilters() {
  const categories = ['all', ...new Set(allArticles.map(a => a.category))];
  const filterEl = document.getElementById('category-filter');
  filterEl.innerHTML = categories.map(c =>
    `<button class="cat-pill${c === currentCategory ? ' active' : ''}" data-category="${c}">${c === 'all' ? 'Все' : c}</button>`
  ).join('');

  filterEl.addEventListener('click', e => {
    if (e.target.classList.contains('cat-pill')) {
      filterEl.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentCategory = e.target.dataset.category;
      currentPage = 1;
      filterAndDisplay();
    }
  });
}

function initSearch() {
  const input = document.getElementById('article-search');
  if (!input) return;
  input.addEventListener('input', () => {
    currentPage = 1;
    filterAndDisplay();
  });
}

function filterAndDisplay() {
  const query = (document.getElementById('article-search')?.value || '').toLowerCase().trim();
  let filtered = allArticles;

  if (currentCategory !== 'all') {
    filtered = filtered.filter(a => a.category === currentCategory);
  }
  if (query) {
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(query) ||
      a.excerpt.toLowerCase().includes(query) ||
      (a.category || '').toLowerCase().includes(query)
    );
  }

  const totalPages = Math.ceil(filtered.length / perPage);
  const start = (currentPage - 1) * perPage;
  const pageArticles = filtered.slice(start, start + perPage);

  const categoryMap = {
    'Технологии': 'cat-tech', 'Гайды': 'cat-guides', 'Консоли': 'cat-consoles',
    'Аналитика': 'cat-analytics', 'Тренды': 'cat-trends'
  };

  const container = document.getElementById('articles-list');
  if (pageArticles.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fas fa-search"></i></div><h3>Ничего не найдено</h3><p>Попробуйте изменить запрос или категорию.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  container.innerHTML = pageArticles.map(a => {
    const catClass = categoryMap[a.category] || '';
    const isFirst = (currentPage === 1 && allArticles.indexOf(a) === 0);
    return `
    <a href="${a.url}" class="article-card${isFirst ? ' featured' : ''}">
      ${a.category ? `<span class="card-category ${catClass}">${a.category}</span>` : ''}
      <h3>${a.title}</h3>
      <p class="card-excerpt">${a.excerpt || ''}</p>
      <div class="card-meta">
        <span><i class="far fa-calendar"></i> ${a.date || ''}</span>
        <span><i class="far fa-clock"></i> ${a.readTime || '5 мин'}</span>
      </div>
    </a>`;
  }).join('');

  // Pagination
  const pagEl = document.getElementById('pagination');
  if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
  let pagHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    pagHTML += `<button class="page-btn${i === currentPage ? ' active' : ''}" data-page="${i}">${i}</button>`;
  }
  pagEl.innerHTML = pagHTML;
  pagEl.querySelectorAll('.page-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = parseInt(btn.dataset.page);
      filterAndDisplay();
      window.scrollTo({ top: 300, behavior: 'smooth' });
    });
  });
}
</script>

<!-- Card mouse tracking (spotlight effect) -->
<script>
document.addEventListener('mouseover', e => {
  const card = e.target.closest('.article-card');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  card.style.setProperty('--mouse-x', x + '%');
  card.style.setProperty('--mouse-y', y + '%');
});
</script>
