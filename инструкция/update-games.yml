name: Обновление страниц игр (Steam + SteamSpy)

on:
  schedule:
    - cron: "0 3 * * *" # каждый день в 03:00 UTC (06:00 МСК)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-games:
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Генерация страниц игр
        env:
          STEADY_LIMIT: "15"
          FRESH_LIMIT: "35"
          ARCHIVE_DIR: "archive"
          DELAY_MS: "1500"
        run: node scripts/generate-games.js

      - name: Коммит и пуш изменений
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ articles-data.js
          git diff --quiet --cached || git commit -m "Автообновление страниц игр: $(date -u +'%Y-%m-%d')"
          git push
