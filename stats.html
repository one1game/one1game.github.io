<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статистика поиска | One1Game</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <link rel="stylesheet" href="styles.css?v=7" />
  <style>
    body { background: #06060c; }
    .stats-container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .stats-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
    }
    .stats-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }
    .stats-header h1 { font-size: 1.4rem; font-weight: 750; color: #fff; }
    .stats-btn {
      background: var(--cyan); color: #000; border: none;
      padding: 10px 24px; border-radius: 8px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .stats-btn:hover { opacity: 0.85; }
    .stats-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .stats-btn.outline {
      background: transparent; color: var(--cyan);
      border: 1px solid rgba(0,229,255,0.3);
    }
    .stats-loading {
      text-align: center; padding: 48px 0; color: var(--text-faint);
    }
    .stats-error {
      background: rgba(255,45,123,0.08); border: 1px solid rgba(255,45,123,0.2);
      border-radius: 8px; padding: 16px 20px; color: var(--magenta);
      font-size: 0.85rem; margin-bottom: 20px;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
    }
    .stat-value {
      font-size: 2.2rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 0.7rem; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px;
    }
    .query-table { width: 100%; border-collapse: collapse; }
    .query-table thead th {
      background: var(--surface); color: var(--text-faint);
      font-weight: 600; text-align: left; padding: 10px 14px;
      border-bottom: 2px solid var(--border); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .query-table tbody td {
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text); font-size: 0.85rem;
    }
    .query-table tbody tr:hover td { background: rgba(0,229,255,0.02); }
    .query-table .pos { font-weight: 700; color: var(--lime); }
    .query-table .pos.low { color: var(--gold); }
    .query-table .pos.bad { color: var(--text-faint); }
    .section-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.1em; margin: 28px 0 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .range-select {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .range-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-faint); padding: 5px 12px; border-radius: 50px;
      font-size: 0.72rem; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .range-btn.active, .range-btn:hover {
      border-color: var(--cyan); color: var(--cyan);
    }
    .range-btn.active { background: rgba(0,229,255,0.08); }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stats-container { margin: 30px auto; padding: 0 12px; }
      .stats-card { padding: 20px; }
    }
  </style>
</head>
<body>
<main id="main-content">
<div class="stats-container">
  <div class="stats-card" id="stats-root">
    <div class="stats-header">
      <h1>Поисковая статистика</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="stats-btn outline" id="btn-logout" style="display:none">Выйти</button>
        <button class="stats-btn" id="btn-connect">Подключить Google</button>
      </div>
    </div>
    <div id="stats-content">
      <div class="stats-loading">Нажмите «Подключить Google» для авторизации</div>
    </div>
  </div>
</div>
</main>
<script src="components.js" defer></script>
<script>
(function() {
  'use strict';

  var CLIENT_ID = '317591594868-5k8h3ie4ck78sb7ouqghrgf46lirc9jo.apps.googleusercontent.com';
  var SITE_URL = 'https://one1game.github.io';
  var SCOPE = 'https://www.googleapis.com/auth/webmasters.readonly';
  var currentRange = '30d';

  var redirectUri = window.location.origin + window.location.pathname;

  // Google Identity Services
  function loadGis() {
    var s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = initButtons;
    document.head.appendChild(s);
  }

  var tokenClient;

  function initButtons() {
    tokenClient = google.accounts.oauth2.initCodeClient({
      client_id: CLIENT_ID,
      scope: SCOPE,
      ux_mode: 'popup',
      callback: function(resp) {
        if (resp.code) {
          exchangeCode(resp.code);
        }
      }
    });

    document.getElementById('btn-connect').addEventListener('click', function() {
      tokenClient.requestCode();
    });

    document.getElementById('btn-logout').addEventListener('click', function() {
      var tok = google.accounts.oauth2.initCodeClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        ux_mode: 'popup',
        callback: function() {}
      });
      sessionStorage.removeItem('sc_access_token');
      sessionStorage.removeItem('sc_refresh_token');
      updateUI(false);
      document.getElementById('stats-content').innerHTML =
        '<div class="stats-loading">Нажмите «Подключить Google» для авторизации</div>';
    });
  }

  function exchangeCode(code) {
    document.getElementById('btn-connect').disabled = true;
    document.getElementById('btn-connect').textContent = 'Подключение...';

    var params = new URLSearchParams();
    params.append('code', code);
    params.append('client_id', CLIENT_ID);
    params.append('redirect_uri', redirectUri);
    params.append('grant_type', 'authorization_code');

    fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error_description || data.error);
      sessionStorage.setItem('sc_access_token', data.access_token);
      updateUI(true);
      loadData();
    })
    .catch(function(err) {
      document.getElementById('stats-content').innerHTML =
        '<div class="stats-error">Ошибка авторизации: ' + err.message + '</div>';
      document.getElementById('btn-connect').disabled = false;
      document.getElementById('btn-connect').textContent = 'Подключить Google';
    });
  }

  function updateUI(loggedIn) {
    document.getElementById('btn-connect').style.display = loggedIn ? 'none' : 'inline-block';
    document.getElementById('btn-logout').style.display = loggedIn ? 'inline-block' : 'none';
    document.getElementById('btn-connect').disabled = false;
    document.getElementById('btn-connect').textContent = 'Подключить Google';
  }

  function loadData() {
    var tok = sessionStorage.getItem('sc_access_token');
    if (!tok) { updateUI(false); return; }
    updateUI(true);
    document.getElementById('stats-content').innerHTML =
      '<div class="stats-loading">Загрузка статистики...</div>';

    // Date range
    var endDate = new Date().toISOString().split('T')[0];
    var startDate;
    switch(currentRange) {
      case '7d': startDate = new Date(Date.now() - 7*86400000).toISOString().split('T')[0]; break;
      case '90d': startDate = new Date(Date.now() - 90*86400000).toISOString().split('T')[0]; break;
      default: startDate = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
    }

    var body = {
      startDate: startDate,
      endDate: endDate,
      dimensions: ['query'],
      rowLimit: 20,
      startRow: 0
    };

    fetch('https://www.googleapis.com/webmasters/v3/sites/' + encodeURIComponent(SITE_URL) + '/searchAnalytics/query', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + tok,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    })
    .then(function(r) {
      if (r.status === 401) {
        sessionStorage.removeItem('sc_access_token');
        updateUI(false);
        throw new Error('unauthenticated');
      }
      return r.json();
    })
    .then(function(data) {
      if (data.error) throw new Error(data.error.message);
      renderStats(data);
    })
    .catch(function(err) {
      if (err.message === 'unauthenticated') {
        document.getElementById('stats-content').innerHTML =
          '<div class="stats-loading">Сессия истекла. Нажмите «Подключить Google»</div>';
        return;
      }
      document.getElementById('stats-content').innerHTML =
        '<div class="stats-error">Ошибка загрузки: ' + err.message + '</div>';
    });
  }

  function renderStats(data) {
    var rows = data.rows || [];
    if (!rows.length) {
      document.getElementById('stats-content').innerHTML =
        '<div class="stats-loading">Нет данных за выбранный период. Возможно, сайт ещё не проиндексирован.</div>';
      return;
    }

    var totalClicks = 0, totalImpressions = 0, totalPos = 0;
    rows.forEach(function(r) {
      totalClicks += r.clicks || 0;
      totalImpressions += r.impressions || 0;
      totalPos += (r.position || 0) * (r.impressions || 0);
    });
    var avgPos = totalImpressions > 0 ? (totalPos / totalImpressions) : 0;
    var ctr = totalImpressions > 0 ? ((totalClicks / totalImpressions) * 100) : 0;

    var rangeLabels = { '7d': '7 дн', '30d': '30 дн', '90d': '90 дн' };

    var html = '';
    html += '<div class="range-select">';
    ['7d','30d','90d'].forEach(function(r) {
      html += '<button class="range-btn' + (currentRange === r ? ' active' : '') +
        '" data-range="' + r + '">' + rangeLabels[r] + '</button>';
    });
    html += '</div>';

    html += '<div class="stats-grid">' +
      '<div class="stat-box"><div class="stat-value">' + totalClicks.toLocaleString() + '</div><div class="stat-label">Кликов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + totalImpressions.toLocaleString() + '</div><div class="stat-label">Показов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + ctr.toFixed(1) + '%</div><div class="stat-label">CTR</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + avgPos.toFixed(1) + '</div><div class="stat-label">Средняя позиция</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + rows.length + '</div><div class="stat-label">Запросов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + (data.responseAggregationType || 'auto') + '</div><div class="stat-label">Аггрегация</div></div>' +
    '</div>';

    html += '<div class="section-title">Поисковые запросы</div>';
    html += '<table class="query-table"><thead><tr><th>Запрос</th><th>Клики</th><th>Показы</th><th>CTR</th><th>Позиция</th></tr></thead><tbody>';

    // Sort by clicks descending
    rows.sort(function(a, b) { return (b.clicks || 0) - (a.clicks || 0); });

    rows.forEach(function(r) {
      var keys = r.keys || [];
      var query = keys[0] || '—';
      var clicks = r.clicks || 0;
      var impressions = r.impressions || 0;
      var pos = r.position || 0;
      var ctrRow = impressions > 0 ? ((clicks / impressions) * 100) : 0;
      var posClass = pos <= 3 ? 'pos' : (pos <= 10 ? 'pos low' : 'pos bad');

      html += '<tr>' +
        '<td>' + esc(query) + '</td>' +
        '<td>' + clicks + '</td>' +
        '<td>' + impressions.toLocaleString() + '</td>' +
        '<td>' + ctrRow.toFixed(1) + '%</td>' +
        '<td class="' + posClass + '">' + pos.toFixed(1) + '</td>' +
      '</tr>';
    });

    html += '</tbody></table>';

    document.getElementById('stats-content').innerHTML = html;

    // Range buttons
    document.querySelectorAll('.range-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentRange = this.dataset.range;
        loadData();
      });
    });
  }

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Check existing token
  if (sessionStorage.getItem('sc_access_token')) {
    updateUI(true);
    loadData();
  }

  loadGis();
})();
</script>
</body>
</html>
