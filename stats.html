<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статистика поиска | One1Game</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <link rel="stylesheet" href="styles.css?v=7" />
  <style>
    body { background: #06060c; }
    .stats-container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
    .stats-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
    }
    .stats-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }
    .stats-header h1 { font-size: 1.4rem; font-weight: 750; color: #fff; }
    .stats-btn {
      background: var(--cyan); color: #000; border: none;
      padding: 10px 24px; border-radius: 8px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .stats-btn:hover { opacity: 0.85; }
    .stats-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .stats-btn.outline {
      background: transparent; color: var(--cyan);
      border: 1px solid rgba(0,229,255,0.3);
    }
    .stats-loading {
      text-align: center; padding: 48px 0; color: var(--text-faint);
    }
    .stats-error {
      background: rgba(255,45,123,0.08); border: 1px solid rgba(255,45,123,0.2);
      border-radius: 8px; padding: 16px 20px; color: var(--magenta);
      font-size: 0.85rem; margin-bottom: 20px;
    }
    .stats-success {
      background: rgba(57,255,20,0.06); border: 1px solid rgba(57,255,20,0.2);
      border-radius: 8px; padding: 16px 20px; color: var(--lime);
      font-size: 0.85rem; margin-bottom: 20px;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
    }
    .stat-value {
      font-size: 2.2rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 0.7rem; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px;
    }
    .query-table { width: 100%; border-collapse: collapse; }
    .query-table thead th {
      background: var(--surface); color: var(--text-faint);
      font-weight: 600; text-align: left; padding: 10px 14px;
      border-bottom: 2px solid var(--border); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .query-table tbody td {
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text); font-size: 0.85rem;
    }
    .query-table tbody tr:hover td { background: rgba(0,229,255,0.02); }
    .query-table .pos { font-weight: 700; color: var(--lime); }
    .query-table .pos.low { color: var(--gold); }
    .query-table .pos.bad { color: var(--text-faint); }
    .section-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.1em; margin: 28px 0 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .range-select {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .range-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-faint); padding: 5px 12px; border-radius: 50px;
      font-size: 0.72rem; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .range-btn.active, .range-btn:hover {
      border-color: var(--cyan); color: var(--cyan);
    }
    .range-btn.active { background: rgba(0,229,255,0.08); }
    .site-badge {
      display: inline-block; padding: 3px 10px; border-radius: 4px;
      background: rgba(0,229,255,0.08); color: var(--cyan);
      font-size: 0.7rem; font-family: monospace; margin-bottom: 16px;
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stats-container { margin: 30px auto; padding: 0 12px; }
      .stats-card { padding: 20px; }
    }
  </style>
</head>
<body>
<main id="main-content">
<div class="stats-container">
  <div class="stats-card" id="stats-root">
    <div class="stats-header">
      <h1>Поисковая статистика</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="stats-btn outline" id="btn-logout" style="display:none">Выйти</button>
        <button class="stats-btn" id="btn-connect">Подключить Google</button>
      </div>
    </div>
    <div id="stats-content">
      <div class="stats-loading">Нажмите «Подключить Google» для авторизации</div>
    </div>
  </div>
</div>
</main>
<script src="components.js" defer></script>
<script>
(function() {
  'use strict';

  /* ===================================================
   *  КОНФИГУРАЦИЯ
   * =================================================== */

  var CLIENT_ID = '317591594868-5k8h3ie4ck78sb7ouqghrgf46lirc9jo.apps.googleusercontent.com';
  var SCOPE = 'https://www.googleapis.com/auth/webmasters.readonly';

  // Жёстко заданный redirect_uri — должен совпадать с настройками в Google Cloud Console
  var REDIRECT_URI = 'https://one1game.github.io/stats.html';

  // Ищем сайт по этим шаблонам (domain-property и url-prefix)
  var SITE_PATTERNS = [
    'https://one1game.github.io/',
    'sc-domain:one1game.github.io'
  ];

  var currentRange = '30d';

  /* ===================================================
   *  DOM
   * =================================================== */

  var btnConnect = document.getElementById('btn-connect');
  var btnLogout = document.getElementById('btn-logout');
  var contentEl  = document.getElementById('stats-content');

  /* ===================================================
   *  УТИЛИТЫ
   * =================================================== */

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function showLoading(msg) {
    contentEl.innerHTML = '<div class="stats-loading">' + esc(msg) + '</div>';
  }

  function showError(msg) {
    contentEl.innerHTML = '<div class="stats-error">' + msg + '</div>';
  }

  function getToken() {
    return sessionStorage.getItem('sc_access_token');
  }

  function setToken(token) {
    if (token) sessionStorage.setItem('sc_access_token', token);
    else sessionStorage.removeItem('sc_access_token');
  }

  /* ===================================================
   *  UI: АВТОРИЗАЦИЯ
   * =================================================== */

  function updateUI(loggedIn) {
    btnConnect.style.display = loggedIn ? 'none' : 'inline-block';
    btnLogout.style.display = loggedIn ? 'inline-block' : 'none';
    btnConnect.disabled = false;
    btnConnect.textContent = 'Подключить Google';
  }

  function startAuth() {
    var authUrl =
      'https://accounts.google.com/o/oauth2/v2/auth' +
      '?client_id=' + encodeURIComponent(CLIENT_ID) +
      '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
      '&response_type=token' +
      '&scope=' + encodeURIComponent(SCOPE) +
      '&prompt=consent';
    window.location.href = authUrl;
  }

  function logout() {
    setToken(null);
    updateUI(false);
    contentEl.innerHTML = '<div class="stats-loading">Нажмите «Подключить Google» для авторизации</div>';
  }

  btnConnect.addEventListener('click', startAuth);
  btnLogout.addEventListener('click', logout);

  /* ===================================================
   *  ОБРАБОТКА OAuth CALLBACK
   * =================================================== */

  function handleAuthCallback() {
    var hash = window.location.hash.substring(1);
    if (!hash) return false;

    var params = new URLSearchParams(hash);
    var token  = params.get('access_token');
    var error  = params.get('error');

    // Очищаем хеш из адресной строки
    window.location.hash = '';

    if (token) {
      setToken(token);
      updateUI(true);
      loadData();
      return true;
    }

    if (error) {
      showError('Ошибка авторизации: ' + esc(error));
      return true;
    }

    return false;
  }

  /* ===================================================
   *  API: SEARCH CONSOLE
   * =================================================== */

  var apiLastStatus = 0;

  function api(path, opts) {
    opts = opts || {};
    var headers = {
      'Authorization': 'Bearer ' + getToken()
    };
    if (opts.body) {
      headers['Content-Type'] = 'application/json';
    }
    return fetch('https://www.googleapis.com/webmasters/v3/' + path, {
      method: opts.method || 'GET',
      headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    }).then(function(r) {
      apiLastStatus = r.status;
      if (r.status === 401) {
        setToken(null);
        updateUI(false);
        showError('Токен истёк. Нажмите «Подключить Google» заново.');
        throw new Error('unauthenticated');
      }
      if (r.status === 403) {
        throw new Error('forbidden');
      }
      return r.json().then(function(data) {
        if (data.error) throw new Error(data.error.message || 'Ошибка API');
        return data;
      });
    });
  }

  function fetchSites() {
    return api('sites').then(function(data) {
      var entries = data.siteEntry || [];
      var matched = [];

      entries.forEach(function(entry) {
        var url = entry.siteUrl || '';
        SITE_PATTERNS.forEach(function(pattern) {
          if (url === pattern) matched.push(url);
        });
      });

      if (!matched.length) {
        var list = entries.map(function(e) { return e.siteUrl; }).join(', ');
        throw new Error(
          'Сайт one1game.github.io не найден в Search Console.<br><br>' +
          'Доступные сайты в аккаунте: ' + esc(list || 'нет') + '<br><br>' +
          'Убедитесь, что сайт добавлен как <code>https://one1game.github.io/</code> ' +
          '(URL-префикс) в Google Search Console.'
        );
      }

      return matched;
    });
  }

  function fetchAnalytics(siteUrl, startDate, endDate) {
    return api('sites/' + encodeURIComponent(siteUrl) + '/searchAnalytics/query', {
      method: 'POST',
      body: {
        startDate: startDate,
        endDate: endDate,
        dimensions: ['query'],
        rowLimit: 50,
        startRow: 0
      }
    });
  }

  /* ===================================================
   *  ЗАГРУЗКА ДАННЫХ
   * =================================================== */

  function loadData() {
    var token = getToken();
    if (!token) { updateUI(false); return; }

    updateUI(true);
    showLoading('Загрузка статистики...');

    var endDate = new Date().toISOString().split('T')[0];
    var days = currentRange === '7d' ? 7 : currentRange === '90d' ? 90 : 30;
    var startDate = new Date(Date.now() - days * 86400000).toISOString().split('T')[0];

    fetchSites()
      .then(function(sites) {
        return trySites(sites, startDate, endDate, 0, []);
      })
      .then(function(result) {
        if (!result) {
          showError(
            'Не удалось получить данные ни по одному ресурсу Search Console.<br><br>' +
            'Возможные причины:<br>' +
            '1. Ваш Google-аккаунт не добавлен как владелец сайта в <a href="https://search.google.com/search-console" target="_blank" style="color:var(--cyan)">Search Console</a><br>' +
            '2. У сайта ещё нет поисковых данных (не проиндексирован)<br>' +
            '3. Выбранный период не содержит данных'
          );
          return;
        }
        renderStats(result.data, result.siteUrl);
      })
      .catch(function(err) {
        if (err.message === 'unauthenticated') return;
        showError('Ошибка: ' + esc(err.message));
      });
  }

  function trySites(sites, startDate, endDate, idx, failures) {
    if (idx >= sites.length) {
      // Все сайты перебраны — собираем диагностику
      if (failures.length) {
        var parts = failures.map(function(f) {
          return '<b>' + esc(f.site) + '</b>: ' + esc(f.reason);
        });
        var detail = parts.join('<br>') + '<br><br>';
        showError(
          'Не удалось получить данные. Проверено сайтов: ' + sites.length + '.<br><br>' +
          detail +
          'Убедитесь, что аккаунт добавлен как владелец в <a href="https://search.google.com/search-console" target="_blank" style="color:var(--cyan)">Search Console</a>'
        );
      }
      return Promise.resolve(null);
    }

    return fetchAnalytics(sites[idx], startDate, endDate)
      .then(function(data) {
        if (data.rows && data.rows.length) {
          return { data: data, siteUrl: sites[idx] };
        }
        failures.push({ site: sites[idx], reason: 'Нет данных (rows пуст)' });
        return trySites(sites, startDate, endDate, idx + 1, failures);
      })
      .catch(function(err) {
        if (err.message === 'unauthenticated') throw err;
        if (err.message === 'forbidden') {
          failures.push({ site: sites[idx], reason: 'HTTP 403 — нет доступа к этому ресурсу' });
        } else {
          failures.push({ site: sites[idx], reason: err.message });
        }
        return trySites(sites, startDate, endDate, idx + 1, failures);
      });
  }

  /* ===================================================
   *  ОТРИСОВКА
   * =================================================== */

  function renderStats(data, siteUrl) {
    var rows = data.rows || [];

    if (!rows.length) {
      showError('Нет данных за выбранный период. Возможно, сайт ещё не проиндексирован.');
      return;
    }

    // Агрегация
    var totalClicks = 0, totalImpressions = 0, sumPos = 0;
    rows.forEach(function(r) {
      totalClicks     += r.clicks || 0;
      totalImpressions += r.impressions || 0;
      sumPos          += (r.position || 0) * (r.impressions || 0);
    });

    var avgPos = totalImpressions > 0 ? (sumPos / totalImpressions) : 0;
    var ctr    = totalImpressions > 0 ? ((totalClicks / totalImpressions) * 100) : 0;

    var rangeLabels = { '7d': '7 дн', '30d': '30 дн', '90d': '90 дн' };

    var html = '';

    // Сайт
    html += '<div class="site-badge">' + esc(siteUrl) + '</div>';

    // Кнопки диапазона
    html += '<div class="range-select">';
    ['7d', '30d', '90d'].forEach(function(r) {
      html += '<button class="range-btn' + (currentRange === r ? ' active' : '') +
        '" data-range="' + r + '">' + rangeLabels[r] + '</button>';
    });
    html += '</div>';

    // Статистика
    html += '<div class="stats-grid">' +
      '<div class="stat-box"><div class="stat-value">' + totalClicks.toLocaleString() + '</div><div class="stat-label">Кликов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + totalImpressions.toLocaleString() + '</div><div class="stat-label">Показов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + ctr.toFixed(1) + '%</div><div class="stat-label">CTR</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + avgPos.toFixed(1) + '</div><div class="stat-label">Средняя позиция</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + rows.length + '</div><div class="stat-label">Запросов</div></div>' +
      '<div class="stat-box"><div class="stat-value">' + (data.responseAggregationType || 'auto') + '</div><div class="stat-label">Аггрегация</div></div>' +
    '</div>';

    // Таблица запросов
    html += '<div class="section-title">Поисковые запросы</div>';
    html += '<table class="query-table"><thead><tr><th>Запрос</th><th>Клики</th><th>Показы</th><th>CTR</th><th>Позиция</th></tr></thead><tbody>';

    rows.sort(function(a, b) { return (b.clicks || 0) - (a.clicks || 0); });

    rows.forEach(function(r) {
      var query       = (r.keys || [])[0] || '—';
      var clicks      = r.clicks || 0;
      var impressions = r.impressions || 0;
      var pos         = r.position || 0;
      var ctrRow      = impressions > 0 ? ((clicks / impressions) * 100) : 0;
      var posClass    = pos <= 3 ? 'pos' : (pos <= 10 ? 'pos low' : 'pos bad');

      html += '<tr>' +
        '<td>' + esc(query) + '</td>' +
        '<td>' + clicks + '</td>' +
        '<td>' + impressions.toLocaleString() + '</td>' +
        '<td>' + ctrRow.toFixed(1) + '%</td>' +
        '<td class="' + posClass + '">' + pos.toFixed(1) + '</td>' +
      '</tr>';
    });

    html += '</tbody></table>';
    contentEl.innerHTML = html;

    // Обработчики кнопок диапазона
    var rangeBtns = contentEl.querySelectorAll('.range-btn');
    for (var i = 0; i < rangeBtns.length; i++) {
      rangeBtns[i].addEventListener('click', function() {
        currentRange = this.dataset.range;
        loadData();
      });
    }
  }

  /* ===================================================
   *  ИНИЦИАЛИЗАЦИЯ
   * =================================================== */

  // Проверяем callback от OAuth
  if (!handleAuthCallback()) {
    // Нет коллбэка — проверяем сохранённый токен
    var savedToken = getToken();
    if (savedToken) {
      updateUI(true);
      loadData();
    }
  }
})();
</script>
</body>
</html>
